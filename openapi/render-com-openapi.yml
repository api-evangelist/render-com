components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Render API key created in the Render Dashboard, sent as an Authorization Bearer token.
  parameters:
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
    DeployId:
      name: deployId
      in: path
      required: true
      schema:
        type: string
    OwnerId:
      name: ownerId
      in: path
      required: true
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    MetricResource:
      name: resource
      in: query
      required: true
      schema:
        type: array
        items:
          type: string
  responses:
    Unauthorized:
      description: Authentication failed or the API key is missing.
    NotFound:
      description: The requested resource was not found.
    TooManyRequests:
      description: Rate limit exceeded. Returns a 429 with Ratelimit-Limit, Ratelimit-Remaining, and Ratelimit-Reset headers.
