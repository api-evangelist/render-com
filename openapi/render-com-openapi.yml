  /logs:
    get:
      operationId: listLogs
      tags: [Logs]
      summary: List logs
      description: >-
        List logs matching the provided filters. Logs are paginated by start
        and end timestamps. For real-time streaming use the WebSocket endpoint
        GET /logs/subscribe (see the companion AsyncAPI document).
      parameters:
        - name: ownerId
          in: query
          required: true
          schema:
            type: string
        - name: resource
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
        - name: level
          in: query
          schema:
            type: array
            items:
              type: string
        - name: text
          in: query
          schema:
            type: array
            items:
              type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of logs.
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /logs/subscribe:
    get:
      operationId: subscribeLogs
      tags: [Logs]
      summary: Subscribe to new logs (WebSocket)
      description: >-
        Upgrades the connection to a WebSocket (wss://api.render.com/v1/logs/subscribe)
        and streams log messages in real time as they are generated, matching the
        provided filters. All resources must be in the same region and belong to the
        same owner. This is a documented WebSocket surface; the streamed message
        schema is modeled in the companion AsyncAPI document
        (asyncapi/render-com-asyncapi.yml). A 101 response indicates a successful
        upgrade.
      parameters:
        - name: ownerId
          in: query
          required: true
          schema:
            type: string
        - name: resource
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
        - name: level
          in: query
          schema:
            type: array
            items:
              type: string
        - name: text
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '101':
          description: Switching Protocols - the connection is upgraded to a WebSocket.
        '401':
          $ref: '#/components/responses/Unauthorized'
