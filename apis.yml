aid: render-com
url: https://raw.githubusercontent.com/api-evangelist/render-com/refs/heads/main/apis.yml
name: Render
kind: company
description: Render is a unified cloud application platform (PaaS) for building, deploying,
  and scaling web services, static sites, background workers, cron jobs, and one-off
  jobs alongside managed Postgres and Key Value (Redis-compatible) datastores. The
  Render REST API (https://api.render.com/v1) exposes almost all Render Dashboard
  capabilities - services, deploys, custom domains, environment variables and groups,
  persistent disks, Blueprints, projects and environments, metrics, and logs - with
  a documented WebSocket surface for real-time log streaming.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Cloud Hosting
- PaaS
- Deployment
- Web Services
- Databases
- DevOps
created: '2026-07-02'
modified: '2026-07-02'
specificationVersion: '0.19'
