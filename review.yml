aid: render-com
name: Render
review:
  question: Does Render expose a documented public WebSocket API?
  answer: true
  date: '2026-07-02'
  reviewer: API Evangelist
  asyncapiSpecCreated: true
  asyncapiScopeNote: |
    Render publishes a documented public WebSocket endpoint for real-time log
    streaming: "Subscribe to new logs" at GET
    https://api.render.com/v1/logs/subscribe, which upgrades the connection to a
    WebSocket (wss://api.render.com/v1/logs/subscribe) and pushes log messages
    to the client as they are generated. Because this is a genuine server-push
    WebSocket surface (not SSE and not a plain REST endpoint), an AsyncAPI 2.6
    document was authored at asyncapi/render-com-asyncapi.yml modeling the wss
    server, the /logs/subscribe channel with its ws query-parameter bindings
    (ownerId, resource, level, text, etc.), and the streamed LogMessage payload.
    Historical log retrieval is a separate request/response REST endpoint (GET
    /logs) and is modeled in the OpenAPI document, not AsyncAPI.
findings:
  summary: |
    Render exposes a documented public WebSocket API. The primary surface is the
    Render REST API at https://api.render.com/v1 (Bearer API key auth), which
    covers services, deploys, custom domains, environment variables and groups,
    secret files, managed Postgres and Key Value datastores, one-off jobs,
    persistent disks, Blueprints, projects and environments, workspaces and
    members, registry credentials, metrics, logs, and webhooks. In addition to
    the REST surface, Render documents a WebSocket log-subscription endpoint -
    GET /v1/logs/subscribe - that performs an HTTP-to-WebSocket upgrade (HTTP
    101) and then streams log messages in real time as they are generated,
    filtered by ownerId and one or more resource IDs (all resources must be in
    the same region and belong to the same owner). This is a real, documented
    WebSocket (wss) transport, distinct from the request/response GET /logs
    endpoint used for historical log queries.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.render.com/v1
      documented: true
      note: Full control-plane REST API. Bearer API key auth. Cursor and timestamp pagination.
    - protocol: WebSocket
      scheme: wss
      baseURL: wss://api.render.com/v1/logs/subscribe
      documented: true
      note: >-
        "Subscribe to new logs" - opens a WebSocket that streams log messages in
        real time. Documented at api-docs.render.com/reference/subscribe-logs.
        Query params ownerId (required), resource (required, array), plus
        optional level, text, host, statusCode, method, task, taskRun, type,
        path, direction. HTTP 101 on successful upgrade.
    - protocol: SSE
      scheme: https
      documented: false
      note: >-
        Render does not use Server-Sent Events for its API log streaming; the
        real-time surface is a WebSocket, and historical logs are a plain REST
        GET /logs endpoint.
  logStreamNote: |
    Do not confuse two different Render features that both use the phrase "log
    stream": (1) the WebSocket log SUBSCRIPTION on the REST API
    (GET /v1/logs/subscribe) modeled here, and (2) Render "Log Streams", a
    dashboard/config feature that forwards a service's logs to an EXTERNAL
    logging provider over syslog (HOST:PORT) or HTTPS. The latter is outbound
    forwarding configured on Render, not a client-facing streaming API, and is
    not a WebSocket the consumer connects to.
