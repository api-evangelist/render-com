  endpointsModeled:
    - "POST/GET/PATCH/DELETE https://api.render.com/v1/postgres and /postgres/{postgresId} plus /connection-info, /suspend, /resume, /export, /exports, /recovery-info, /recovery, /failover (list GET /postgres confirmed; sub-operations follow Render's documented conventions)"
    - "POST/GET/PATCH/DELETE https://api.render.com/v1/key-value and /key-value/{keyValueId} plus /connection-info (list GET /key-value confirmed)"
    - "POST/GET/PATCH/DELETE https://api.render.com/v1/projects and /projects/{projectId} (list GET /projects confirmed)"
    - "GET/POST/GET/PATCH/DELETE https://api.render.com/v1/environments and /environments/{environmentId}"
    - "GET/POST/GET/PATCH/DELETE https://api.render.com/v1/env-groups, /env-groups/{envGroupId}, and /env-groups/{envGroupId}/env-vars/{envVarKey}"
    - "GET https://api.render.com/v1/metrics/{cpu,memory,bandwidth,instance-count,http-requests,active-connections}"
    - "POST/GET/PATCH/DELETE https://api.render.com/v1/webhooks and /webhooks/{webhookId} plus /events (list GET /webhooks confirmed)"
  endpointConfidence: >-
    Base URL https://api.render.com/v1 and the WebSocket log subscription are
    confirmed against Render's public API reference. Service, deploy, custom
    domain, env-var, secret-file, job, blueprint, disk, owner/member, registry
    credential, dedicated-ip, notification-settings, and user endpoints were
    read directly from the OpenAPI spec. Postgres, Key Value, projects,
    environments, env-groups, metrics, and webhooks show their confirmed list
    endpoints; their per-item CRUD sub-operations are modeled from Render's
    consistent REST conventions and should be reconciled against the live
    OpenAPI spec at https://api.render.com/openapi.json.
sources:
  - url: https://render.com/docs/api
    type: Documentation
    note: API overview - base URL https://api.render.com/v1, API-key auth, OpenAPI spec at https://api.render.com/openapi.json.
  - url: https://api-docs.render.com/reference
    type: APIReference
    note: Interactive API reference for all resource groups.
  - url: https://api-docs.render.com/reference/subscribe-logs
    type: APIReference
    note: Subscribe to new logs - documented WebSocket endpoint GET /v1/logs/subscribe streaming logs in real time (HTTP 101 upgrade).
  - url: https://api-docs.render.com/reference/list-logs
    type: APIReference
    note: GET /v1/logs - historical log query with timestamp pagination (REST, not WebSocket).
  - url: https://api-docs.render.com/reference/rate-limiting
    type: APIReference
    note: Documented per-endpoint rate limits (400/min GET, 30/min writes, etc.), 429 responses, Ratelimit-* headers.
  - url: https://docs.render.com/log-streams
    type: Documentation
    note: Render "Log Streams" is outbound forwarding to an external syslog/HTTPS provider - not the client-facing WebSocket subscription.
  - url: https://render.com/docs/new-workspace-plans
    type: Documentation
    note: 2026 workspace plans (Hobby free, Pro, Scale, Enterprise) replacing per-seat billing.
actions:
  asyncapiPath: asyncapi/render-com-asyncapi.yml
  apisYmlUpdated: true
  reason: |
    Render exposes a real documented public WebSocket surface (the log
    subscription endpoint), so the review answer is true and an AsyncAPI 2.6
    document was authored for the wss://api.render.com/v1/logs/subscribe stream.
    The apis.yml Render Logs API entry references both the OpenAPI (REST GET
    /logs) and the AsyncAPI (WebSocket subscribe) properties so the two
    transports are represented distinctly.
