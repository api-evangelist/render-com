meters:
- name: workspace_plan
  description: Flat monthly workspace plan fee (Hobby free, Pro, Scale, Enterprise).
  unit: subscription
  aggregation: max
  dimensions:
  - workspace
- name: compute_instance
  description: Per-second compute for running service instances, priced by instance type and multiplied by instance count.
  unit: instance-hours
  aggregation: sum
  dimensions:
  - service
  - instanceType
  - project
  - environment
- name: postgres
  description: Managed Render Postgres by plan/instance size plus provisioned storage.
  unit: instance-hours
  aggregation: sum
  dimensions:
  - postgres
  - plan
  - project
- name: key_value
  description: Managed Key Value (Redis-compatible) instances by plan/instance size.
  unit: instance-hours
  aggregation: sum
  dimensions:
  - keyValue
  - plan
  - project
- name: disk_storage
  description: Persistent disk storage attached to services, billed per GB.
  unit: gb-months
  aggregation: sum
  dimensions:
  - service
  - disk
- name: bandwidth
  description: Outbound bandwidth above the included allowance.
  unit: bytes
  aggregation: sum
  dimensions:
  - service
  - project
- name: build_minutes
  description: Pipeline build minutes above the included allowance.
  unit: minutes
  aggregation: sum
  dimensions:
  - service
principles:
- name: Visibility
  description: Use the Metrics API and per-resource labels to track compute, datastore, disk, and bandwidth consumption by service, project, and environment.
- name: Allocation
  description: Organize services and datastores into projects and environments so spend maps to teams and workloads.
- name: Optimization
  description: Automate scale-down, suspend/resume, and autoscaling through the free REST API; right-size instance types; use free-tier and static sites where cold-start latency is acceptable; scope disks and bandwidth to actual need.
- name: Accountability
  description: Assign owners per project/workspace and review monthly resource usage against the flat plan fee and metered charges.
