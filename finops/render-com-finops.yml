description: >-
  FinOps view of Render spend. Render cost has two components: a flat workspace
  plan fee (Hobby free, Pro, Scale, or Enterprise) and metered per-resource
  usage. The dominant usage drivers are compute instances (per instance type -
  Starter, Standard, Pro, Pro Plus, and larger - billed per second while
  running and multiplied by instance count under manual or autoscaling), managed
  Postgres and Key Value datastores (by plan/instance size and storage),
  persistent disks (per GB), outbound bandwidth, and build minutes. The REST API
  and WebSocket log stream are free; they are the control plane you use to
  provision and scale the paid resources, so API-driven automation (autoscaling,
  scheduled scale-down, suspend/resume) is the primary cost-optimization lever.
notes: >-
  Per-unit instance and datastore rates (for example Starter web service
  ~$7/mo, Standard ~$25/mo, Pro ~$85/mo, Pro Plus ~$175/mo) reflect published
  figures at the review date and should be reconciled against the Render pricing
  page. Free-tier web services spin down when idle, which reduces cost but adds
  cold-start latency.
